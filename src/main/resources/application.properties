spring.application.name=ProductMicroservice
server.port=8090
spring.datasource.url=jdbc:mysql://localhost:3306/productmsdb
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=sweety@3422
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.hbm2ddl.auto=update
eureka.client.service-url.defaultZone=http://localhost:8762/eureka

# Kafka Broker
spring.kafka.bootstrap-servers=localhost:9092

# Consumer Group
spring.kafka.consumer.group-id=product-group

# Consumer settings
spring.kafka.consumer.key-serializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer

# Trust all packages for deserialization (be careful in production)
spring.kafka.consumer.properties.spring.json.trusted.packages=*
spring.output.ansi.enabled=ALWAYS
logging.file.name = loggers.log
# Optional: allow reading complex types
#spring.kafka.consumer.properties.spring.json.value.default.type=com.yourpackage.ProductsAddedEvent
